name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  forbidden-files:
    name: Check for forbidden files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if sensitive files are present in tree
        shell: bash
        run: |
          set -e
          # Patterns that must never be committed. Tracked files only — .gitignore
          # already blocks new ones, this catches anything that slipped through.
          patterns=(
            '\.env$'
            '\.env\.[^.]+$'
            '.*\.pem$'
            '.*\.key$'
            '.*\.p12$'
            '.*\.p8$'
            '.*\.jks$'
            '.*\.mobileprovision$'
            'id_rsa(\..*)?$'
            'id_ed25519(\..*)?$'
            '.*credentials(\.json)?$'
            '.*service-account.*\.json$'
          )
          # Exclude .env.example-style template files.
          allow='\.env\.(example|sample|template)$'

          tracked=$(git ls-files)
          fail=0
          for p in "${patterns[@]}"; do
            hits=$(printf '%s\n' "$tracked" | grep -E "$p" | grep -Ev "$allow" || true)
            if [ -n "$hits" ]; then
              echo "::error::Forbidden file(s) matching /$p/:"
              printf '  %s\n' $hits
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "Remove the files above, add them to .gitignore, and rotate any leaked secrets."
            exit 1
          fi

  gitleaks:
    name: Scan for secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
